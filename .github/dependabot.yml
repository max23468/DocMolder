# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Limiti alti + raggruppamento per evitare che gli aggiornamenti restino in coda
# (starvation): con limite basso i pochi slot venivano occupati da PR non
# mergiate e altri update non ottenevano mai una PR.

version: 2
updates:
  - package-ecosystem: "pip" # Python dependencies from pyproject.toml
    directory: "/" # Location of package manifests
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
    labels:
      - "dependencies"
      - "python"
    groups:
      # Un'unica PR per tutti i minor/patch (auto-merge dopo CI). I major restano
      # PR singole cosi' quelli runtime possono avere review manuale.
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      # Un'unica PR per tutti gli aggiornamenti delle Action (anche major):
      # basso rischio e gated dalla CI, quindi in auto-merge.
      github-actions:
        patterns:
          - "*"
