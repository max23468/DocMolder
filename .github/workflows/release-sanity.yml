name: Release Sanity

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Release metadata sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release metadata
        run: python3 scripts/release_sanity.py
