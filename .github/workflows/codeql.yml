name: CodeQL

on:
  # Trigger manuale: CodeQL resta a consumo esplicito.
  workflow_dispatch:
    inputs:
      reason:
        description: Motivo della finestra CodeQL
        required: true
        default: security-window
        type: choice
        options:
          - security-window
          - release-candidate
          - security-sensitive-change
          - manual-investigation

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "schedule" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch origin "${BASE_REF}" --depth=1
            diff_range="origin/${BASE_REF}...HEAD"
          elif [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          else
            diff_range="${BEFORE_SHA}...HEAD"
          fi
          if git diff --name-only "${diff_range}" | grep -E '^(src/.*|pyproject\.toml|requirements.*\.txt|uv\.lock)$'; then
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "code_changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Initialize CodeQL
        if: ${{ !github.event.repository.private && steps.changes.outputs.code_changed == 'true' }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Setup Python
        if: ${{ !github.event.repository.private && steps.changes.outputs.code_changed == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        if: ${{ !github.event.repository.private && steps.changes.outputs.code_changed == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Perform CodeQL analysis
        if: ${{ !github.event.repository.private && steps.changes.outputs.code_changed == 'true' }}
        uses: github/codeql-action/analyze@v4

      - name: Skip CodeQL analysis
        if: ${{ github.event.repository.private || steps.changes.outputs.code_changed != 'true' }}
        run: echo "CodeQL analysis not required for this change."

      - name: Analysis summary
        if: always()
        run: |
          {
            echo "## CodeQL"
            echo ""
            echo "- Reason: \`${{ inputs.reason || 'manual' }}\`"
            echo "- Workflow conclusion: \`${{ job.status }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
