name: Deploy VPS

on:
  push:
    branches:
      - main
    paths:
      - "deploy/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - "src/**"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref or SHA to deploy on the VPS
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-vps-${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCMOLDER_VPS_HOST: ${{ secrets.DOCMOLDER_VPS_HOST }}
      DOCMOLDER_VPS_USER: ${{ secrets.DOCMOLDER_VPS_USER }}
      DOCMOLDER_VPS_PORT: ${{ secrets.DOCMOLDER_VPS_PORT }}
      DOCMOLDER_VPS_SSH_KNOWN_HOSTS: ${{ secrets.DOCMOLDER_VPS_SSH_KNOWN_HOSTS }}
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}

    steps:
      - name: Checkout target revision
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Validate deploy secrets
        env:
          DOCMOLDER_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.DOCMOLDER_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          missing=0
          for var in DOCMOLDER_VPS_HOST DOCMOLDER_VPS_SSH_PRIVATE_KEY_B64; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: ${var}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Set deploy defaults
        run: |
          set -euo pipefail

          echo "DOCMOLDER_VPS_USER=${DOCMOLDER_VPS_USER:-opc}" >> "${GITHUB_ENV}"
          echo "DOCMOLDER_VPS_PORT=${DOCMOLDER_VPS_PORT:-22}" >> "${GITHUB_ENV}"

      - name: Prepare SSH key
        env:
          DOCMOLDER_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.DOCMOLDER_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          printf '%s' "${DOCMOLDER_VPS_SSH_PRIVATE_KEY_B64}" | base64 --decode > "${HOME}/.ssh/docmolder_vps"
          chmod 600 "${HOME}/.ssh/docmolder_vps"

      - name: Prepare known_hosts
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          touch "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

          if [ -n "${DOCMOLDER_VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${DOCMOLDER_VPS_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
            echo "SSH_STRICT=yes" >> "${GITHUB_ENV}"
          else
            echo "SSH_STRICT=accept-new" >> "${GITHUB_ENV}"
          fi

      - name: Sync repository to VPS
        run: |
          set -euo pipefail

          export COPYFILE_DISABLE=1

          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=__pycache__ \
            -czf - . \
          | ssh \
              -i "${HOME}/.ssh/docmolder_vps" \
              -p "${DOCMOLDER_VPS_PORT}" \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              "${DOCMOLDER_VPS_USER}@${DOCMOLDER_VPS_HOST}" \
              "sudo mkdir -p /opt/docmolder/app && sudo rm -rf /opt/docmolder/app/* /opt/docmolder/app/.[!.]* /opt/docmolder/app/..?* && sudo tar -xzf - -C /opt/docmolder/app"

      - name: Install and restart on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/docmolder_vps" \
            -p "${DOCMOLDER_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${DOCMOLDER_VPS_USER}@${DOCMOLDER_VPS_HOST}" \
            "bash /opt/docmolder/app/deploy/install-vps.sh"

      - name: Verify service status on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/docmolder_vps" \
            -p "${DOCMOLDER_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${DOCMOLDER_VPS_USER}@${DOCMOLDER_VPS_HOST}" \
            "sudo systemctl status docmolder --no-pager && sudo systemctl status docmolder-db-backup.timer --no-pager && sudo systemctl status docmolder-alertcheck.timer --no-pager && sudo systemctl status docmolder-reconcile.timer --no-pager"

      - name: Run operational smoke check on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/docmolder_vps" \
            -p "${DOCMOLDER_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              "${DOCMOLDER_VPS_USER}@${DOCMOLDER_VPS_HOST}" \
              "sudo env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin bash -lc 'set -euo pipefail
              source /opt/docmolder/app/deploy/env-load.sh
              load_docmolder_env_file /etc/docmolder/docmolder.env
              service_name=\"\${DOCMOLDER_SERVICE_NAME:-docmolder}\"
              attempts=\"\${DOCMOLDER_SMOKE_CHECK_ATTEMPTS:-12}\"
              sleep_seconds=\"\${DOCMOLDER_SMOKE_CHECK_SLEEP_SECONDS:-5}\"
              for attempt in \$(seq 1 \"\${attempts}\"); do
                if /opt/docmolder/venv/bin/python -m docmolder.healthcheck --check-service-active --service-name \"\${service_name}\"; then
                  echo \"DocMolder smoke check OK.\"
                  exit 0
                fi
                if [ \"\${attempt}\" -eq \"\${attempts}\" ]; then
                  echo \"DocMolder smoke check non stabile dopo \${attempts} tentativi.\" >&2
                  exit 1
                fi
                echo \"Healthcheck non ancora stabile (\${attempt}/\${attempts}), nuovo tentativo tra \${sleep_seconds}s...\"
                sleep \"\${sleep_seconds}\"
              done'"

      - name: Smoke test Telegram Bot API on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/docmolder_vps" \
            -p "${DOCMOLDER_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${DOCMOLDER_VPS_USER}@${DOCMOLDER_VPS_HOST}" \
            "set -euo pipefail
            token=\$(sudo grep '^DOCMOLDER_TELEGRAM_TOKEN=' /etc/docmolder/docmolder.env | cut -d= -f2-)
            if [ -z \"\${token}\" ] || [ \"\${token}\" = \"changeme\" ]; then
              echo 'DOCMOLDER_TELEGRAM_TOKEN is missing on the VPS.' >&2
              exit 1
            fi

            /opt/docmolder/venv/bin/python -c 'import json, sys, urllib.request; token=sys.argv[1]; payload=json.load(urllib.request.urlopen(f\"https://api.telegram.org/bot{token}/getMe\", timeout=20)); assert payload.get(\"ok\") is True, payload; username=payload.get(\"result\", {}).get(\"username\"); assert username, payload; print(f\"Bot API smoke OK: @{username}\")' \"\${token}\""

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Deploy VPS"
            echo ""
            echo "- Target ref: \`${TARGET_REF}\`"
            echo "- Workflow conclusion: \`${{ job.status }}\`"
            echo "- VPS host configured: \`${DOCMOLDER_VPS_HOST:+yes}\`"
            echo ""
            echo "Rollback, se serve: esegui il workflow \`Rollback VPS\` con un tag o SHA precedente."
          } >> "${GITHUB_STEP_SUMMARY}"
