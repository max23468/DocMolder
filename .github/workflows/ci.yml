name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify change impact
    runs-on: ubuntu-latest
    outputs:
      no_runtime_impact: ${{ steps.classify.outputs.no_runtime_impact }}
      deploy_relevant: ${{ steps.classify.outputs.deploy_relevant }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify diff
        id: classify
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
        run: |
          set -euo pipefail
          if [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF="HEAD~1"
          fi
          python3 scripts/classify_changes.py --base "${BASE_REF}" --format env > change-impact.env
          cat change-impact.env
          {
            echo "no_runtime_impact=$(awk -F= '/DOCMOLDER_NO_RUNTIME_IMPACT=/{print $2}' change-impact.env)"
            echo "deploy_relevant=$(awk -F= '/DOCMOLDER_DEPLOY_RELEVANT=/{print $2}' change-impact.env)"
            echo "docs_only=$(awk -F= '/DOCMOLDER_DOCS_ONLY=/{print $2}' change-impact.env)"
          } >> "${GITHUB_OUTPUT}"

  lint-and-test:
    name: Python ${{ matrix.python-version }}
    needs: classify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: needs.classify.outputs.no_runtime_impact != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        if: needs.classify.outputs.no_runtime_impact != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run quality checks
        if: needs.classify.outputs.no_runtime_impact != 'true'
        run: bash scripts/ci_verify.sh

      - name: Skip heavy checks for no-runtime change
        if: needs.classify.outputs.no_runtime_impact == 'true'
        run: |
          echo "No runtime-impacting files changed; skipping Python matrix work."

  package-build:
    runs-on: ubuntu-latest
    needs:
      - classify
      - lint-and-test
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: needs.classify.outputs.no_runtime_impact != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        if: needs.classify.outputs.no_runtime_impact != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Build package
        if: needs.classify.outputs.no_runtime_impact != 'true'
        run: python -m build

      - name: Upload package artifacts
        if: needs.classify.outputs.no_runtime_impact != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: error

      - name: Skip package build for no-runtime change
        if: needs.classify.outputs.no_runtime_impact == 'true'
        run: |
          echo "No runtime-impacting files changed; package build not required."
