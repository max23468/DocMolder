name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      full_tests:
        description: Run quality, test matrix and package build regardless of diff
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

env:
  DOPPLER_TOKEN_PRESENT: ${{ secrets.DOPPLER_TOKEN != '' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify change impact
    runs-on: ubuntu-latest
    outputs:
      no_runtime_impact: ${{ steps.classify.outputs.no_runtime_impact }}
      deploy_relevant: ${{ steps.classify.outputs.deploy_relevant }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      full_tests_required: ${{ steps.classify.outputs.full_tests_required }}
      package_build_required: ${{ steps.classify.outputs.package_build_required }}
      coverage_required: ${{ steps.classify.outputs.coverage_required }}
      fast_static_required: ${{ steps.classify.outputs.fast_static_required }}
      dependency_review_required: ${{ steps.classify.outputs.dependency_review_required }}
      release_owned: ${{ steps.classify.outputs.release_owned }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Nessun fetch Doppler qui: la classify non usa secret e un secret con
      # valore "true" maschererebbe gli output booleani, azzerandoli tra i job
      # (le gate a valle vedrebbero '' invece di 'true' e verrebbero saltate).
      - name: Classify diff
        id: classify
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
          FORCE_FULL_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.full_tests }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
            for candidate in origin/main main HEAD~1; do
              if git rev-parse --verify --quiet "${candidate}" >/dev/null; then
                BASE_REF="${candidate}"
                break
              fi
            done
          fi
          python3 scripts/classify_changes.py --base "${BASE_REF}" --format env > change-impact.env
          cat change-impact.env
          if [ "${FORCE_FULL_TESTS}" = "true" ]; then
            {
              echo "DOCMOLDER_FULL_TESTS_REQUIRED=true"
              echo "DOCMOLDER_PACKAGE_BUILD_REQUIRED=true"
              echo "DOCMOLDER_COVERAGE_REQUIRED=true"
              echo "DOCMOLDER_NO_RUNTIME_IMPACT=false"
            } >> change-impact.env
          fi
          {
            echo "no_runtime_impact=$(awk -F= '/DOCMOLDER_NO_RUNTIME_IMPACT=/{value=$2} END{print value}' change-impact.env)"
            echo "deploy_relevant=$(awk -F= '/DOCMOLDER_DEPLOY_RELEVANT=/{print $2}' change-impact.env)"
            echo "docs_only=$(awk -F= '/DOCMOLDER_DOCS_ONLY=/{print $2}' change-impact.env)"
            echo "full_tests_required=$(awk -F= '/DOCMOLDER_FULL_TESTS_REQUIRED=/{value=$2} END{print value}' change-impact.env)"
            echo "package_build_required=$(awk -F= '/DOCMOLDER_PACKAGE_BUILD_REQUIRED=/{value=$2} END{print value}' change-impact.env)"
            echo "coverage_required=$(awk -F= '/DOCMOLDER_COVERAGE_REQUIRED=/{value=$2} END{print value}' change-impact.env)"
            echo "fast_static_required=$(awk -F= '/DOCMOLDER_FAST_STATIC_REQUIRED=/{print $2}' change-impact.env)"
            echo "dependency_review_required=$(awk -F= '/DOCMOLDER_DEPENDENCY_REVIEW_REQUIRED=/{print $2}' change-impact.env)"
            echo "release_owned=$(awk -F= '/DOCMOLDER_RELEASE_OWNED=/{print $2}' change-impact.env)"
          } >> "${GITHUB_OUTPUT}"

  pr-policy:
    name: PR policy
    needs: classify
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verifica variabili Doppler
        env:
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
          DOPPLER_TOKEN_PRESENT: ${{ env.DOPPLER_TOKEN_PRESENT }}
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT:-false}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Validate PR title and release files
        run: python3 scripts/check_pr_policy.py --title "${PR_TITLE}" --head-ref "${PR_HEAD_REF}" --release-owned "${RELEASE_OWNED}"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.head_ref }}
          RELEASE_OWNED: ${{ needs.classify.outputs.release_owned }}

  dependency-review:
    name: Dependency review
    needs: classify
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft && needs.classify.outputs.dependency_review_required == 'true' && (!github.event.repository.private || vars.DOCMOLDER_ENABLE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verifica variabili Doppler
        env:
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
          DOPPLER_TOKEN_PRESENT: ${{ env.DOPPLER_TOKEN_PRESENT }}
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT:-false}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  fast-gate:
    name: Fast gate
    needs: classify
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verifica variabili Doppler
        env:
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
          DOPPLER_TOKEN_PRESENT: ${{ env.DOPPLER_TOKEN_PRESENT }}
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT:-false}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Run static workflow and script checks
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
            for candidate in origin/main main HEAD~1; do
              if git rev-parse --verify --quiet "${candidate}" >/dev/null; then
                BASE_REF="${candidate}"
                break
              fi
            done
          fi
          bash scripts/ci_static_verify.sh "${BASE_REF}"

  quality:
    name: Quality gate
    needs:
      - classify
      - fast-gate
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft) && needs.classify.outputs.full_tests_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verifica variabili Doppler
        env:
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
          DOPPLER_TOKEN_PRESENT: ${{ env.DOPPLER_TOKEN_PRESENT }}
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT:-false}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run quality checks
        run: bash scripts/ci_quality.sh

  test:
    name: Python ${{ matrix.python-version }}
    needs:
      - classify
      - fast-gate
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft) && needs.classify.outputs.full_tests_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verifica variabili Doppler
        env:
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
          DOPPLER_TOKEN_PRESENT: ${{ env.DOPPLER_TOKEN_PRESENT }}
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT:-false}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Setup Python
        if: needs.classify.outputs.no_runtime_impact != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: bash scripts/ci_test.sh --coverage

      - name: Run tests without coverage
        if: matrix.python-version != '3.13'
        run: bash scripts/ci_test.sh --no-coverage

  package-build:
    runs-on: ubuntu-latest
    needs:
      - classify
      - fast-gate
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft) && needs.classify.outputs.package_build_required == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verifica variabili Doppler
        env:
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
          DOPPLER_TOKEN_PRESENT: ${{ env.DOPPLER_TOKEN_PRESENT }}
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT:-false}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Setup Python
        if: needs.classify.outputs.no_runtime_impact != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Build package
        run: python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: error

  ci-result:
    name: CI result
    needs:
      - classify
      - pr-policy
      - dependency-review
      - fast-gate
      - quality
      - test
      - package-build
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required CI jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: payload.get("result")
              for name, payload in needs.items()
              if payload.get("result") not in {"success", "skipped"}
          }
          if failed:
              for name, result in sorted(failed.items()):
                  print(f"::error::{name} ended with {result}")
              sys.exit(1)

          print("CI result OK.")
          PY
