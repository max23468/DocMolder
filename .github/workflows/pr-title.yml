name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  semantic-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          title = os.environ["PR_TITLE"].strip()
          pattern = re.compile(
              r"^(feat|fix|ops|security|docs|deps|refactor|test|chore|build|ci)(\([a-z0-9._/-]+\))?(!)?: [^ ].+$"
          )

          if pattern.match(title):
              print(f"PR title OK: {title}")
              raise SystemExit(0)

          print("Invalid PR title.")
          print("Use: <type>(optional-scope)!: short summary")
          print("Allowed types: feat, fix, ops, security, docs, deps, refactor, test, chore, build, ci")
          print(f"Current title: {title}")
          sys.exit(1)
          PY
