name: Codex PR comments

on:
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, closed]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Analizza senza aggiornare la issue inbox"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-pr-comments
  cancel-in-progress: false

jobs:
  codex-pr-comments:
    name: Sync Codex feedback inbox
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout trusted workflow code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Checkout PR head for same-repo pull_request_target
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          if [ "${EVENT_NAME}" != "pull_request_target" ]; then
            exit 0
          fi

          if [ "${PR_HEAD_REPO_FULL_NAME}" != "${REPOSITORY_NAME}" ]; then
            echo "PR esterna alla repo: mantengo checkout su default branch"
            exit 0
          fi

          if [ -z "${PR_HEAD_REF}" ]; then
            echo "PR senza head ref: nessun checkout extra."
            exit 0
          fi

          if ! git check-ref-format --branch "${PR_HEAD_REF}" >/dev/null 2>&1; then
            echo "Head ref PR non valido: mantengo checkout su default branch."
            exit 0
          fi

          if ! git fetch origin "${PR_HEAD_REF}"; then
            echo "Impossibile fare fetch del branch PR ${PR_HEAD_REF} (probabilmente cancellato): mantengo checkout su default branch."
            exit 0
          fi
          git checkout "${PR_HEAD_REF}"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Sync Codex feedback inbox
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/handle-codex-pr-comments.mjs
