name: Codex PR comments

on:
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, closed]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Analizza senza aggiornare la issue inbox"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-pr-comments
  cancel-in-progress: false

jobs:
  codex-pr-comments:
    name: Sync Codex feedback inbox
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout trusted workflow code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Checkout PR head for same-repo pull_request_target
        run: |
          if [ "${{ github.event_name }}" != "pull_request_target" ]; then
            exit 0
          fi

          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "PR esterna alla repo: mantengo checkout su default branch"
            exit 0
          fi

          if [ -z "${{ github.event.pull_request.head.ref }}" ]; then
            echo "PR senza head ref: nessun checkout extra."
            exit 0
          fi

          git fetch origin "${{ github.event.pull_request.head.ref }}"
          git checkout "${{ github.event.pull_request.head.ref }}"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Sync Codex feedback inbox
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/handle-codex-pr-comments.mjs
