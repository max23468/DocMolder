name: Main Commit Policy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  conventional-main-commits:
    name: Validate commits pushed to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          before = os.environ["BEFORE_SHA"]
          after = os.environ["AFTER_SHA"]
          zero = "0" * 40

          conventional = re.compile(
              r"^(feat|fix|ops|security|docs|deps|refactor|test|chore|build|ci)(\([a-z0-9._/-]+\))?(!)?: [^ ].+ \(#\d+\)$"
          )
          release_commit = re.compile(
              r"^chore\(main\): release docmolder \d+\.\d+\.\d+ \(#\d+\)$"
          )
          direct_docs_commit = re.compile(
              r"^docs(\([a-z0-9._/-]+\))?: [^ ].+"
          )
          direct_docs_paths = ("AGENTS.md", "README.md")

          def changed_files_for(sha: str) -> list[str]:
              return subprocess.check_output(
                  ["git", "diff-tree", "--no-commit-id", "--name-only", "-r", "--root", sha],
                  text=True,
              ).splitlines()

          def is_direct_docs_commit(sha: str, subject: str) -> bool:
              if not direct_docs_commit.match(subject):
                  return False
              changed_files = changed_files_for(sha)
              return bool(changed_files) and all(
                  path in direct_docs_paths or path.startswith("docs/")
                  for path in changed_files
              )

          rev_range = after if before == zero else f"{before}..{after}"
          output = subprocess.check_output(
              ["git", "log", "--format=%H%x09%s", rev_range],
              text=True,
          ).strip()

          if not output:
              print("No commits to validate.")
              raise SystemExit(0)

          invalid = []
          for line in output.splitlines():
              sha, subject = line.split("\t", 1)
              if conventional.match(subject) or release_commit.match(subject) or is_direct_docs_commit(sha, subject):
                  continue
              invalid.append((sha, subject))

          if not invalid:
              print("All commits pushed to main use the expected release-friendly format.")
              raise SystemExit(0)

          print("Found commits on main that do not follow the required format:")
          for sha, subject in invalid:
              print(f"- {sha[:7]} {subject}")
          print("")
          print("Use squash-merged PR commits on main so release-please can derive the next version correctly.")
          print("Expected format on main: conventional title plus PR suffix, for example feat(bot): add retry flow (#123).")
          print("Exception: direct docs commits are allowed only for docs:, AGENTS.md, README.md, or docs/**.")
          sys.exit(1)
          PY
